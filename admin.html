<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin SOKAN</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;padding:20px;background:#0a0e1a;color:white}
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:6px;border:none}
button{padding:10px;background:#1E6FD9;color:white;border:none;cursor:pointer;margin-top:5px}
.card{background:#111;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>

<body>

<h2>Admin SOKAN BUSINESS</h2>

<h3>Chatbot</h3>
<input id="botName" placeholder="Nom chatbot">
<textarea id="botContext" placeholder="Contexte entreprise"></textarea>
<button onclick="saveBot()">Sauvegarder Chatbot</button>

<h3>Témoignages</h3>
<input id="name" placeholder="Nom client">
<textarea id="text" placeholder="Témoignage"></textarea>
<button onclick="addTestimonial()">Ajouter</button>

<h3>Liste</h3>
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "TA_VRAIE_CLE",
  authDomain: "sokan-business.firebaseapp.com",
  projectId: "sokan-business"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CHATBOT */
function saveBot(){
  db.collection("settings").doc("chatbot").set({
    name: document.getElementById('botName').value,
    context: document.getElementById('botContext').value
  });
  alert("Chatbot mis à jour");
}

/* AJOUT TEMOIGNAGE */
function addTestimonial(){
  db.collection("testimonials").add({
    name: document.getElementById('name').value,
    text: document.getElementById('text').value,
    createdAt: new Date()
  });
}

/* SUPPRIMER */
function deleteTestimonial(id){
  db.collection("testimonials").doc(id).delete();
}

/* AFFICHAGE TEMOIGNAGES */
db.collection("testimonials").orderBy("createdAt","desc").onSnapshot(snapshot=>{
  const div = document.getElementById('list');
  div.innerHTML="";
  snapshot.forEach(doc=>{
    const d = doc.data();
    div.innerHTML += `
      <div class="card">
        <b>${d.name}</b>
        <p>${d.text}</p>
        <button onclick="deleteTestimonial('${doc.id}')">Supprimer</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
