<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SOKAN BUSINESS</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0a0e1a;color:white}
header{padding:20px;text-align:center;background:#111}
h1{margin:0;color:#60AEFF}
.section{padding:40px 20px}
.card{background:#111;padding:15px;margin:10px 0;border-radius:8px}
</style>
</head>

<body>

<header>
  <h1>SOKAN BUSINESS</h1>
  <p>Logistique internationale</p>
</header>

<div class="section">
  <h2>Nos services</h2>
  <div class="card">🚢 Transport maritime</div>
  <div class="card">✈️ Fret aérien</div>
  <div class="card">🚛 Transport terrestre</div>
  <div class="card">🏛️ Dédouanement</div>
</div>

<div class="section">
  <h2>Témoignages clients</h2>
  <div id="testimonials">Chargement...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZdogkL4uTAN2N23bIkUua3SecIz4Jp_E",
  authDomain: "sokan-business.firebaseapp.com",
  projectId: "sokan-business"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("testimonials")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
  const container = document.getElementById("testimonials");

  if(snapshot.empty){
    container.innerHTML = "<p>Aucun témoignage pour le moment.</p>";
    return;
  }

  container.innerHTML="";
  snapshot.forEach(doc=>{
    const d = doc.data();
    container.innerHTML += `
      <div class="card">
        <b>${d.name}</b>
        <p>${d.text}</p>
      </div>
    `;
  });
});
</script>

<script src="chatbot-widget.js"></script>

</body>
</html>
