<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SOKAN BUSINESS</title>
  <style>
    body { font-family: Arial; }
    #chat { max-width: 400px; margin: 20px auto; border: 1px solid #ccc; padding: 10px; }
    .msg { margin: 10px 0; }
    .user { text-align: right; }
    .bot { text-align: left; }
  </style>
</head>
<body>

<div id="chat">
  <h3>Pape Cheikh</h3>
  <div id="messages"></div>

  <input id="input" placeholder="Votre message..." style="width:70%">
  <button onclick="send()">Envoyer</button>
</div>

<script>
const messagesDiv = document.getElementById('messages');
let history = [];

function addMessage(text, isUser) {
  const div = document.createElement('div');
  div.className = 'msg ' + (isUser ? 'user' : 'bot');
  div.innerText = text;
  messagesDiv.appendChild(div);
}

addMessage("Bonjour 👋\nJe suis Pape Cheikh, assistant chez SOKAN BUSINESS.\nJe peux vous aider pour vos expéditions, délais et tarifs. Que souhaitez-vous envoyer ?", false);

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, true);
  history.push({ role: 'user', content: text });
  input.value = "";

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history, lang: 'fr' })
    });

    const data = await res.json();
    addMessage(data.reply, false);

    history.push({ role: 'assistant', content: data.reply });

  } catch (e) {
    addMessage("Erreur de connexion. Réessayez.", false);
  }
}
</script>

</body>
</html>
